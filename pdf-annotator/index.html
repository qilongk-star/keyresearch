<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Annotator for Notion</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #191919; color: #fff; min-height: 100vh; }
    
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: #2d2d2d; display: flex; align-items: center; gap: 12px;
      padding: 0 20px; z-index: 1000; border-bottom: 1px solid #404040;
    }
    .toolbar button { 
      padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; 
      font-size: 14px; font-weight: 500; transition: all 0.2s;
    }
    .toolbar button:hover { transform: translateY(-1px); }
    .toolbar .btn-primary { background: #0078d4; color: white; }
    .toolbar .btn-primary:hover { background: #106ebe; }
    .toolbar .btn-secondary { background: #404040; color: white; }
    .toolbar .btn-highlight { background: linear-gradient(135deg, #ffd700, #ffb700); color: #000; }
    .toolbar .btn-note { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .toolbar .btn-active { box-shadow: 0 0 0 3px rgba(0,120,212,0.5); }
    
    .main { margin-top: 56px; padding: 20px; }
    
    #upload-section { 
      text-align: center; padding: 80px 20px; 
    }
    #upload-section.hidden { display: none; }
    .upload-box {
      border: 3px dashed #404040; border-radius: 16px; padding: 60px 40px;
      max-width: 600px; margin: 0 auto; transition: all 0.3s;
    }
    .upload-box:hover { border-color: #0078d4; background: rgba(0,120,212,0.1); }
    .upload-box input[type="file"] { display: none; }
    .upload-box label {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 32px; background: #0078d4; color: white;
      border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600;
    }
    .upload-box label:hover { background: #106ebe; }
    .upload-box p { margin-top: 24px; color: #888; font-size: 14px; }
    
    #pdf-section { display: none; }
    #pdf-section.active { display: block; }
    
    #pdf-container { max-width: 1000px; margin: 0 auto; }
    
    .page-wrapper {
      position: relative; margin-bottom: 24px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-radius: 8px; overflow: hidden;
    }
    .page-wrapper canvas { display: block; }
    
    .text-layer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.2; line-height: 1.0;
    }
    .text-layer > span { position: absolute; white-space: pre; }
    
    .annotation-layer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    .annotation-layer.active { pointer-events: auto; cursor: crosshair; }
    
    .highlight-span {
      background: rgba(255, 215, 0, 0.4); border-radius: 3px;
      position: absolute; pointer-events: auto;
      transition: background 0.2s;
    }
    .highlight-span:hover { background: rgba(255, 215, 0, 0.6); }
    
    .note-marker {
      position: absolute; width: 28px; height: 28px; 
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border-radius: 50%; cursor: pointer; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 14px; color: white; font-weight: bold;
      box-shadow: 0 2px 8px rgba(231,76,60,0.4);
      pointer-events: auto; transition: transform 0.2s;
    }
    .note-marker:hover { transform: scale(1.1); }
    
    .note-popup {
      position: absolute; background: #fff; color: #333; padding: 16px;
      border-radius: 12px; width: 280px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 100; 
      font-size: 14px; line-height: 1.5;
    }
    .note-popup::before {
      content: ''; position: absolute; top: -10px; left: 14px;
      border: 10px solid transparent; border-bottom-color: #fff; border-top: none;
    }
    .note-popup textarea { 
      width: 100%; border: 2px solid #ddd; border-radius: 8px; 
      padding: 10px; resize: none; font-size: 14px; min-height: 80px;
    }
    .note-popup textarea:focus { border-color: #0078d4; outline: none; }
    .note-popup-buttons { margin-top: 12px; display: flex; gap: 8px; }
    .note-popup button { 
      flex: 1; padding: 8px 16px; border: none; border-radius: 6px; 
      cursor: pointer; font-weight: 500;
    }
    .note-popup .btn-save { background: #0078d4; color: white; }
    .note-popup .btn-delete { background: #e74c3c; color: white; }
    
    .sidebar {
      position: fixed; top: 56px; right: 0; width: 320px; 
      height: calc(100vh - 56px); background: #252525; 
      border-left: 1px solid #404040; overflow-y: auto; 
      padding: 20px; display: none;
    }
    .sidebar.active { display: block; }
    .sidebar h3 { font-size: 16px; margin-bottom: 16px; color: #fff; }
    
    .annotation-item {
      background: #353535; border-radius: 10px; padding: 12px; 
      margin-bottom: 12px; cursor: pointer; 
      border: 2px solid transparent; transition: all 0.2s;
    }
    .annotation-item:hover { border-color: #0078d4; }
    .annotation-item.highlight { border-left: 4px solid #ffd700; }
    .annotation-item.note { border-left: 4px solid #e74c3c; }
    .annotation-item .page { font-size: 12px; color: #888; margin-bottom: 6px; }
    .annotation-item .text { font-size: 13px; color: #ddd; line-height: 1.4; }
    
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); display: none;
      align-items: center; justify-content: center; z-index: 2000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #2d2d2d; padding: 32px; border-radius: 16px; 
      width: 420px; max-width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-content h3 { margin-bottom: 20px; font-size: 18px; }
    .modal-content input { 
      width: 100%; padding: 12px; margin-bottom: 16px; 
      border: 2px solid #404040; background: #1a1a1a; color: #fff; 
      border-radius: 8px; font-size: 14px;
    }
    .modal-content input:focus { border-color: #0078d4; outline: none; }
    .modal-content button { 
      width: 100%; padding: 14px; background: #0078d4; color: white; 
      border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
    }
    .modal-content button:hover { background: #106ebe; }
    .modal-content button.secondary { 
      background: #404040; margin-top: 10px; 
    }
    
    .status { 
      font-size: 13px; padding: 8px 14px; background: #353535; 
      border-radius: 8px; display: flex; align-items: center; gap: 8px;
    }
    .status.connected { background: #107c10; }
    .status.error { background: #d13438; }
    .status-dot { 
      width: 8px; height: 8px; border-radius: 50%; background: #888;
    }
    .status.connected .status-dot { background: #4caf50; }
    
    .page-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #2d2d2d; border-radius: 12px; padding: 12px 20px;
      display: flex; align-items: center; gap: 16px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .page-nav button { 
      background: #404040; border: none; color: white; 
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
    }
    .page-nav span { color: #fff; font-size: 14px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <input type="file" id="file-input" accept=".pdf" style="display:none">
    <button class="btn-primary" onclick="document.getElementById('file-input').click()">📁 打开 PDF</button>
    
    <div style="flex:1"></div>
    
    <button class="btn-secondary btn-highlight" id="btn-highlight" onclick="setMode('highlight')">🖍️ 高亮</button>
    <button class="btn-secondary btn-note" id="btn-note" onclick="setMode('note')">📝 批注</button>
    <button class="btn-secondary" id="btn-select" onclick="setMode('select')">↖️ 选择</button>
    
    <div style="flex:1"></div>
    
    <div class="status" id="status"><span class="status-dot"></span>未连接 Fcitx</div>
    <button class="btn-primary" onclick="openNotionSetup()">⚙️ 设置 Fcitx</button>
    <button class="btn-primary" onclick="saveToNotion()">💾 保存</button>
    <button class="btn-secondary" onclick="loadFromNotion()">📂 加载</button>
  </div>
  
  <div class="main">
    <div id="upload-section">
      <div class="upload-box">
        <input type="file" id="file-input-main" accept=".pdf">
        <label for="file-input-main" onclick="document.getElementById('file-input-main').click()">
          📁 选择 PDF 文件
        </label>
        <p>支持 PDF 高亮、批注，数据保存到 Notion 数据库</p>
        <p style="margin-top:12px;font-size:12px;">先点击「设置 Notion」配置 Notion Token 和数据库 ID</p>
      </div>
    </div>
    
    <div id="pdf-section">
      <div id="pdf-container"></div>
    </div>
  </div>
  
  <div class="sidebar" id="sidebar">
    <h3>📋 批注列表</h3>
    <div id="annotation-list"></div>
  </div>
  
  <div class="modal" id="notion-modal">
    <div class="modal-content">
      <h3>⚙️ Notion 配置</h3>
      <input type="text" id="notion-token" placeholder="Integration Token (ntn_xxx 或 secret_xxx)">
      <input type="text" id="notion-db" placeholder="数据库 ID (32位字符)">
      <p style="font-size:12px;color:#888;margin-bottom:16px">
        1. 在 Notion 创建数据库，添加字段：PdfName(title)、Annotations(json)<br>
        2. 创建 Integration 并复制 Token<br>
        3. 将数据库与 Integration 连接
      </p>
      <button onclick="saveNotionConfig()">保存配置</button>
      <button class="secondary" onclick="closeModal('notion-modal')">取消</button>
    </div>
  </div>
  
  <div class="modal" id="note-modal">
    <div class="modal-content">
      <h3>📝 添加批注</h3>
      <textarea id="note-text" rows="4" placeholder="输入批注内容..." style="width:100%;padding:12px;border:2px solid #404040;background:#1a1a1a;color:#fff;border-radius:8px;resize:none;font-size:14px;"></textarea>
      <div style="display:flex;gap:12px;margin-top:16px">
        <button onclick="saveNote()" style="flex:1">保存</button>
        <button class="secondary" onclick="closeModal('note-modal')" style="flex:1">取消</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="pdf-name-modal">
    <div class="modal-content">
      <h3>📄 PDF 名称</h3>
      <input type="text" id="pdf-name-input" placeholder="为这个 PDF 命名...">
      <button onclick="confirmSave()">保存到 Notion</button>
      <button class="secondary" onclick="closeModal('pdf-name-modal')">取消</button>
    </div>
  </div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let totalPages = 0;
let mode = 'select';
let scale = 1.5;
let annotations = [];
let pages = [];
let pendingNotePosition = null;

let notionConfig = {
  token: localStorage.getItem('notion_token') || '',
  dbId: localStorage.getItem('notion_db_id') || ''
};

function $(id) { return document.getElementById(id); }
function updateStatus(text, connected = false) {
  const s = $('status');
  s.innerHTML = `<span class="status-dot"></span>${text}`;
  s.className = 'status' + (connected ? ' connected' : '');
}

if (notionConfig.token && notionConfig.dbId) {
  updateStatus('已连接', true);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.annotation-layer').forEach(layer => {
    layer.className = 'annotation-layer' + (m !== 'select' ? ' active' : '');
  });
  document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('btn-active'));
  $('btn-' + m)?.classList.add('btn-active');
}

async function loadPDF(file) {
  if (!file) return;
  
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  totalPages = pdfDoc.numPages;
  
  $('upload-section').classList.add('hidden');
  $('pdf-section').classList.add('active');
  $('sidebar').classList.add('active');
  $('pdf-container').innerHTML = '';
  pages = [];
  annotations = [];
  
  for (let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale });
    
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.dataset.page = i;
    
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    
    const textLayerDiv = document.createElement('div');
    textLayerDiv.className = 'text-layer';
    textLayerDiv.style.cssText = `position:absolute;top:0;left:0;width:${viewport.width}px;height:${viewport.height}px;`;
    
    const annotationLayer = document.createElement('div');
    annotationLayer.className = 'annotation-layer';
    annotationLayer.style.cssText = `position:absolute;top:0;left:0;width:${viewport.width}px;height:${viewport.height}px;`;
    
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    
    wrapper.appendChild(canvas);
    wrapper.appendChild(textLayerDiv);
    wrapper.appendChild(annotationLayer);
    $('pdf-container').appendChild(wrapper);
    
    pages.push({ page, canvas, viewport, wrapper, annotationLayer, textLayerDiv, pageNum: i });
    
    // Render text layer for selection
    const textContent = await page.getTextContent();
    await pdfjsLib.renderTextLayer({
      textContentSource: { promise: Promise.resolve(textContent) },
      container: textLayerDiv,
      viewport: viewport,
      textDivs: []
    });
    
    setupAnnotationEvents(annotationLayer, i);
  }
  
  setMode('select');
  updateStatus(`已加载 ${totalPages} 页`, true);
  updateAnnotationList();
}

function setupAnnotationEvents(layer, pageNum) {
  layer.addEventListener('mousedown', (e) => {
    if (mode !== 'note') return;
    
    const rect = layer.getBoundingClientRect();
    pendingNotePosition = { 
      pageNum, 
      x: (e.clientX - rect.left) / rect.width, 
      y: (e.clientY - rect.top) / rect.height 
    };
    $('note-text').value = '';
    $('note-modal').classList.add('active');
  });
  
  layer.addEventListener('mouseup', (e) => {
    if (mode !== 'highlight') return;
    
    const selection = window.getSelection();
    if (!selection.rangeCount || selection.isCollapsed) return;
    
    // Find which page
    let targetPage = null;
    for (const p of pages) {
      const rect = p.wrapper.getBoundingClientRect();
      const selRect = selection.getRangeAt(0).getBoundingClientRect();
      if (selRect.top >= rect.top && selRect.bottom <= rect.bottom) {
        targetPage = p;
        break;
      }
    }
    if (!targetPage) return;
    
    const range = selection.getRangeAt(0);
    const rangeRects = range.getClientRects();
    const hlRects = [];
    
    for (let i = 0; i < rangeRects.length; i++) {
      const r = rangeRects[i];
      const pageRect = targetPage.wrapper.getBoundingClientRect();
      hlRects.push({
        x: (r.left - pageRect.left) / pageRect.width,
        y: (r.top - pageRect.top) / pageRect.height,
        width: r.width / pageRect.width,
        height: r.height / pageRect.height
      });
    }
    
    const hl = {
      id: 'hl_' + Date.now(),
      type: 'highlight',
      pageNum: targetPage.pageNum,
      text: selection.toString(),
      color: '#ffd700',
      rects: hlRects
    };
    
    annotations.push(hl);
    renderHighlight(hl, targetPage);
    selection.removeAllRanges();
    updateAnnotationList();
  });
}

function renderHighlight(hl, page) {
  const layer = page.annotationLayer;
  const rect = page.wrapper.getBoundingClientRect();
  
  hl.rects.forEach(r => {
    const span = document.createElement('div');
    span.className = 'highlight-span';
    span.style.left = (r.x * 100) + '%';
    span.style.top = (r.y * 100) + '%';
    span.style.width = (r.width * 100) + '%';
    span.style.height = (r.height * 100) + '%';
    span.style.background = hl.color + '66';
    layer.appendChild(span);
  });
}

function saveNote() {
  const text = $('note-text').value.trim();
  if (!text || !pendingNotePosition) return;
  
  const note = {
    id: 'note_' + Date.now(),
    type: 'note',
    pageNum: pendingNotePosition.pageNum,
    text: text,
    x: pendingNotePosition.x,
    y: pendingNotePosition.y
  };
  
  annotations.push(note);
  renderNote(note);
  updateAnnotationList();
  closeModal('note-modal');
  pendingNotePosition = null;
}

function renderNote(note) {
  const page = pages.find(p => p.pageNum === note.pageNum);
  if (!page) return;
  
  const marker = document.createElement('div');
  marker.className = 'note-marker';
  marker.style.left = (note.x * 100) + '%';
  marker.style.top = (note.y * 100) + '%';
  marker.textContent = '📝';
  marker.dataset.noteId = note.id;
  
  marker.addEventListener('click', (e) => {
    e.stopPropagation();
    showNotePopup(note, marker);
  });
  
  page.annotationLayer.appendChild(marker);
}

function showNotePopup(note, marker) {
  document.querySelectorAll('.note-popup').forEach(p => p.remove());
  
  const popup = document.createElement('div');
  popup.className = 'note-popup';
  popup.innerHTML = `
    <div>${note.text}</div>
    <div class="note-popup-buttons">
      <button class="btn-delete" onclick="deleteAnnotation('${note.id}')">删除</button>
      <button class="btn-save" onclick="document.querySelectorAll('.note-popup').forEach(p=>p.remove())">关闭</button>
    </div>
  `;
  
  const markerRect = marker.getBoundingClientRect();
  popup.style.left = markerRect.left + 'px';
  popup.style.top = (markerRect.bottom + 14) + 'px';
  popup.style.position = 'fixed';
  
  document.body.appendChild(popup);
  
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target) && !marker.contains(e.target)) {
        popup.remove();
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}

function deleteAnnotation(id) {
  annotations = annotations.filter(a => a.id !== id);
  document.querySelectorAll(`[data-note-id="${id}"]`).forEach(el => el.remove());
  document.querySelectorAll('.note-popup').forEach(p => p.remove());
  updateAnnotationList();
}

function updateAnnotationList() {
  const list = $('annotation-list');
  list.innerHTML = '';
  
  if (annotations.length === 0) {
    list.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">暂无批注</p>';
    return;
  }
  
  const grouped = {};
  annotations.forEach(a => {
    if (!grouped[a.pageNum]) grouped[a.pageNum] = [];
    grouped[a.pageNum].push(a);
  });
  
  Object.keys(grouped).sort((a,b) => a-b).forEach(pg => {
    grouped[pg].forEach(a => {
      const item = document.createElement('div');
      item.className = `annotation-item ${a.type}`;
      item.innerHTML = `
        <div class="page">第 ${a.pageNum} 页</div>
        <div class="text">${a.text || '批注'}</div>
      `;
      item.onclick = () => goToAnnotation(a);
      list.appendChild(item);
    });
  });
}

function goToAnnotation(a) {
  const wrapper = document.querySelector(`[data-page="${a.pageNum}"]`);
  if (wrapper) {
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderAnnotations() {
  annotations.forEach(a => {
    const page = pages.find(p => p.pageNum === a.pageNum);
    if (!page) return;
    
    if (a.type === 'highlight') renderHighlight(a, page);
    else if (a.type === 'note') renderNote(a);
  });
}

function openNotionSetup() {
  $('notion-token').value = notionConfig.token;
  $('notion-db').value = notionConfig.dbId;
  $('notion-modal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function saveNotionConfig() {
  notionConfig.token = $('notion-token').value.trim();
  notionConfig.dbId = $('notion-db').value.trim();
  localStorage.setItem('notion_token', notionConfig.token);
  localStorage.setItem('notion_db_id', notionConfig.dbId);
  updateStatus('已连接', true);
  closeModal('notion-modal');
}

function saveToNotion() {
  if (!notionConfig.token || !notionConfig.dbId) {
    alert('请先设置 Notion 连接');
    openNotionSetup();
    return;
  }
  $('pdf-name-modal').classList.add('active');
}

async function confirmSave() {
  const pdfName = $('pdf-name-input').value || 'PDF-' + new Date().toISOString().slice(0,10);
  closeModal('pdf-name-modal');
  
  const data = {
    pdf_name: pdfName,
    total_pages: totalPages,
    annotations: annotations,
    created_at: new Date().toISOString()
  };
  
  try {
    const resp = await fetch('https://api.notion.com/v1/pages', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + notionConfig.token,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        parent: { database_id: notionConfig.dbId },
        properties: {
          Name: { title: [{ text: { content: pdfName } }] },
          Annotations: { rich_text: [{ text: { content: JSON.stringify(data) } }] }
        }
      })
    });
    
    const result = await resp.json();
    if (result.object === 'error') {
      alert('保存失败: ' + result.message);
    } else {
      alert('✅ 已保存到 Notion: ' + pdfName);
    }
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

async function loadFromNotion() {
  if (!notionConfig.token || !notionConfig.dbId) {
    alert('请先设置 Notion 连接');
    openNotionSetup();
    return;
  }
  
  try {
    const resp = await fetch(`https://api.notion.com/v1/databases/${notionConfig.dbId}/query`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + notionConfig.token,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ page_size: 50 })
    });
    
    const result = await resp.json();
    if (result.object === 'error') {
      alert('加载失败: ' + result.message);
      return;
    }
    
    const list = result.results || [];
    if (list.length === 0) {
      alert('没有保存的 PDF 标注');
      return;
    }
    
    const names = list.map((p, i) => `${i+1}. ${p.properties.Name?.title?.[0]?.plain_text || 'Untitled'}`).join('\n');
    const choice = prompt('选择要加载的 PDF:\n\n' + names + '\n\n输入序号:');
    const idx = parseInt(choice) - 1;
    
    if (idx >= 0 && idx < list.length) {
      const dataStr = list[idx].properties.Annotations?.rich_text?.[0]?.plain_text;
      if (dataStr) {
        const data = JSON.parse(dataStr);
        annotations = data.annotations || [];
        renderAnnotations();
        updateAnnotationList();
        alert('✅ 已加载: ' + data.pdf_name + ' (' + annotations.length + ' 条批注)');
      }
    }
  } catch (e) {
    alert('加载失败: ' + e.message);
  }
}

document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});
document.getElementById('file-input-main').addEventListener('change', (e) => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// Expose functions
window.setMode = setMode;
window.saveNote = saveNote;
window.deleteAnnotation = deleteAnnotation;
window.openNotionSetup = openNotionSetup;
window.closeModal = closeModal;
window.saveNotionConfig = saveNotionConfig;
window.saveToNotion = saveToNotion;
window.confirmSave = confirmSave;
window.loadFromNotion = loadFromNotion;
</script>
