<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scale Bank - KeyResearch</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
:root {
  --bg-primary: #0f1117; --bg-secondary: #1a1b26; --bg-tertiary: #24253a;
  --text-primary: #e1e2e8; --text-secondary: #9398b0; --text-muted: #5f6382;
  --accent: #7c6aef; --accent-hover: #6a56e0; --accent-soft: rgba(124,106,239,0.15);
  --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
  --border: #2d2e42; --radius: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--bg-secondary); }
.header-left { display:flex; align-items:center; gap:12px; }
.logo { height:32px; border-radius:6px; }
.nav-links { display:flex; gap:6px; }
.nav-links a { padding:6px 14px; border-radius:6px; font-size:13px; color:var(--text-secondary); transition:0.15s; }
.nav-links a:hover, .nav-links a.active { background:var(--accent-soft); color:var(--accent); text-decoration:none; }

.main { display:flex; height: calc(100vh - 61px); }

/* Sidebar */
.sidebar { width:320px; border-right:1px solid var(--border); background:var(--bg-secondary); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-header h3 { font-size:14px; font-weight:600; }
.btn { padding:6px 14px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; transition:0.15s; }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-ghost { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--bg-tertiary); color:var(--text-primary); }
.btn-danger { background:var(--danger); color:white; }
.btn-sm { padding:4px 10px; font-size:11px; }

.search-box { padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-tertiary); color:var(--text-primary); font-size:13px; width:100%; outline:none; margin-bottom:8px; }

.scale-list { flex:1; overflow-y:auto; padding:8px; }
.scale-item { padding:10px 12px; border-radius:8px; cursor:pointer; transition:0.15s; border:1px solid transparent; margin-bottom:4px; }
.scale-item:hover { background:var(--bg-tertiary); }
.scale-item.active { background:var(--accent-soft); border-color:var(--accent); }
.scale-item-name { font-size:13px; font-weight:600; margin-bottom:2px; }
.scale-item-meta { font-size:11px; color:var(--text-muted); }
.scale-item-tags { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.tag { padding:2px 6px; border-radius:4px; font-size:10px; background:var(--bg-tertiary); color:var(--text-secondary); }

/* Content */
.content { flex:1; overflow-y:auto; padding:24px; }
.content-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.content-header h2 { font-size:18px; }

/* Detail */
.detail-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
.detail-card { background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.detail-card h4 { font-size:12px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; letter-spacing:0.5px; }
.item-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
.item-row:last-child { border-bottom:none; }
.paper-link { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; background:var(--bg-tertiary); font-size:12px; margin-bottom:4px; }
.paper-link a { flex:1; color:var(--accent); }
.usage-badge { padding:2px 6px; border-radius:4px; font-size:10px; background:var(--accent-soft); color:var(--accent); }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:14px; gap:8px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--bg-secondary); border:1px solid var(--border); border-radius:14px; padding:24px; min-width:420px; max-width:560px; max-height:80vh; overflow-y:auto; }
.modal h3 { margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
.form-group input, .form-group textarea, .form-group select { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-tertiary); color:var(--text-primary); font-size:13px; outline:none; }
.form-group textarea { resize:vertical; min-height:80px; }
.form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

.item-editor { display:flex; flex-direction:column; gap:6px; }
.item-input-row { display:flex; gap:6px; align-items:center; }
.item-input-row input { flex:1; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg-tertiary); color:var(--text-primary); font-size:12px; }
.item-input-row label { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); cursor:pointer; white-space:nowrap; }

/* Toast */
.toast-container { position:fixed; top:16px; right:16px; z-index:99999; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 16px; border-radius:8px; font-size:13px; animation:slideIn 0.25s ease; }
.toast-success { background:#065f46; color:#6ee7b7; }
.toast-error { background:#7f1d1d; color:#fca5a5; }
.toast-info { background:#1e3a5f; color:#93c5fd; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* Error Display */
.error-box { background:#2d1b1b; border:1px solid var(--danger); border-radius:8px; padding:16px; color:var(--danger); font-size:13px; margin:20px; }
.error-box h4 { margin-bottom:8px; }
.error-box pre { background:#1a0f0f; padding:10px; border-radius:6px; overflow:auto; font-size:11px; color:#fca5a5; margin-top:8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="../Keylogo.png" class="logo" alt="KeyResearch">
    <nav class="nav-links">
      <a href="../root-index.html">Portal</a>
      <a href="../keysearch/">KeySearch</a>
      <a href="../refcheck/">RefCheck</a>
      <a href="../papers-app/">PapersHub</a>
      <a href="./" class="active">Scale Bank</a>
      <a href="../silicon-sampling/">Silicon Sampling</a>
    </nav>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Scales & Manipulations</h3>
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ New</button>
    </div>
    <div style="padding:8px 12px;">
      <input class="search-box" id="search-input" placeholder="Search scales..." oninput="filterScales()">
    </div>
    <div class="scale-list" id="scale-list" onclick="console.log('list clicked')"></div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <div style="font-size:48px;">&#x1F4CF;</div>
      <div>Select a scale from the left, or create a new one.</div>
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()" style="margin-top:8px;">Create Scale</button>
    </div>
    <div id="detail-view" style="display:none;">
      <div class="content-header">
        <h2 id="detail-title">-</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal()">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteScaleConfirm()">Delete</button>
        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-card">
          <h4>Description</h4>
          <p id="detail-desc" style="font-size:13px;line-height:1.6;color:var(--text-secondary);"></p>
        </div>
        <div class="detail-card">
          <h4>Source Type</h4>
          <p id="detail-source-type" style="font-size:13px;"></p>
          <div id="detail-original" style="margin-top:8px;"></div>
        </div>
        <div class="detail-card">
          <h4>Items (Click to reverse-score)</h4>
          <div id="detail-items"></div>
        </div>
        <div class="detail-card">
          <h4>Linked Papers <button class="btn btn-ghost btn-sm" onclick="openLinkPaperModal()" style="float:right;">+ Link</button></h4>
          <div id="detail-papers"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create/Edit Scale Modal -->
<div class="modal-overlay" id="scale-modal" style="display:none;">
  <div class="modal">
    <h3 id="modal-title">Create Scale</h3>
    <div class="form-group">
      <label>Scale Name *</label>
      <input id="scale-name" placeholder="e.g., Big Five Personality Traits">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="scale-desc" placeholder="Brief description of the scale..."></textarea>
    </div>
    <div class="form-group">
      <label>Source Type</label>
      <select id="scale-source-type" onchange="toggleOriginalGroup()">
        <option value="original">Original</option>
        <option value="adapted">Adapted from another scale</option>
        <option value="modified">Modified from another scale</option>
      </select>
    </div>
    <div class="form-group" id="original-scale-group" style="display:none;">
      <label>Adapted/Modified From</label>
      <select id="original-scale-select"></select>
    </div>
    <div class="form-group">
      <label>Items</label>
      <div class="item-editor" id="items-editor"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="addItemRow()">+ Add Item</button>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeScaleModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveScale()">Save Scale</button>
    </div>
  </div>
</div>

<!-- Link Paper Modal -->
<div class="modal-overlay" id="link-paper-modal" style="display:none;">
  <div class="modal">
    <h3>Link Paper to Scale</h3>
    <div class="form-group">
      <label>Paper (from PapersHub)</label>
      <select id="paper-select" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);"></select>
    </div>
    <div class="form-group">
      <label>Usage Type</label>
      <select id="usage-type" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);">
        <option value="used">Used in study</option>
        <option value="adapted">Scale adapted</option>
        <option value="validated">Scale validated</option>
        <option value="cited">Cited/referenced</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="link-notes" placeholder="Optional notes..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeLinkPaperModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePaperLink()">Link Paper</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
const SUPABASE_URL = 'https://hhgundxzxiqeglzbatmd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_U2qfHiGyIWB9QZtsU6K0QA_a2U4bxDH';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let scales = [];
let papers = [];
let linkedPapers = [];
let selectedScale = null;
let editingScaleId = null;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  console.log('Scale Bank init...');
  try {
    await Promise.all([loadScales(), loadPapers()]);
    console.log('Scales loaded:', scales.length);
    console.log('Papers loaded:', papers.length);
    renderScaleList();
    if (scales.length > 0) selectScale(scales[0].id);
  } catch(e) {
    console.error('Init error:', e);
    showError('Initialization failed', e.message);
  }
}

async function loadScales() {
  try {
    const { data, error } = await sb.from('scales').select(`
      *,
      scale_papers(
        id, paper_id, usage_type, notes,
        papers(id, title)
      )
    `).order('created_at', { ascending: false });
    if (error) {
      console.error('Load scales error:', error);
      showError('Failed to load scales', error.message);
      return;
    }
    scales = data || [];
  } catch(e) {
    console.error('Load scales exception:', e);
    showError('Network error loading scales', e.message);
  }
}

async function loadPapers() {
  try {
    const { data, error } = await sb.from('papers').select('id, title').order('created_at', { ascending: false }).limit(200);
    if (!error) papers = data || [];
  } catch(e) { console.error('Load papers error:', e); }
}

// ═══════════════════════════════════════════
// ERROR HELPER
// ═══════════════════════════════════════════
function showError(title, msg) {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="error-box">
      <h4>&#x26A0;&#xFE0F; ${esc(title)}</h4>
      <p>${esc(msg)}</p>
      <p style="margin-top:12px;font-size:12px;color:var(--text-muted);">
        If this says "relation does not exist", you need to run the SQL in <code>scale-bank/init-db.sql</code> in Supabase Dashboard.
      </p>
      <pre>${esc(msg)}</pre>
      <button class="btn btn-primary btn-sm" onclick="location.reload()" style="margin-top:12px;">Retry</button>
    </div>`;
}

// ═══════════════════════════════════════════
// SCALE LIST
// ═══════════════════════════════════════════
function renderScaleList(filter = '') {
  const list = document.getElementById('scale-list');
  const lower = filter.toLowerCase();
  const filtered = filter ? scales.filter(s => s.name.toLowerCase().includes(lower)) : scales;
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No scales found.</div>';
    return;
  }
  list.innerHTML = filtered.map(s => `
    <div class="scale-item ${selectedScale?.id===s.id?'active':''}" onclick="selectScale('${s.id}')">
      <div class="scale-item-name">${esc(s.name)}</div>
      <div class="scale-item-meta">${(s.items||[]).length} items · ${s.source_type} · ${s.scale_papers?.length||0} papers</div>
    </div>
  `).join('');
}

function filterScales() {
  renderScaleList(document.getElementById('search-input').value);
}

function selectScale(id) {
  selectedScale = scales.find(s => s.id === id);
  renderScaleList();
  renderDetail();
}

// ═══════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════
function renderDetail() {
  const emptyState = document.getElementById('empty-state');
  const detailView = document.getElementById('detail-view');
  if (!selectedScale) { emptyState.style.display='flex'; detailView.style.display='none'; return; }
  emptyState.style.display='none';
  detailView.style.display='block';

  document.getElementById('detail-title').textContent = selectedScale.name;
  document.getElementById('detail-desc').textContent = selectedScale.description || 'No description.';
  document.getElementById('detail-source-type').textContent = selectedScale.source_type;

  // Original scale link
  const origDiv = document.getElementById('detail-original');
  if (selectedScale.original_scale_id) {
    const orig = scales.find(s => s.id === selectedScale.original_scale_id);
    origDiv.innerHTML = orig ? `<span style="color:var(--text-muted);">Adapted from: </span><a href="#" onclick="selectScale('${orig.id}');return false;">${esc(orig.name)}</a>` : '';
  } else {
    origDiv.innerHTML = selectedScale.source_type === 'original' ? '<span style="color:var(--text-muted);font-size:12px;">Original scale</span>' : '';
  }

  // Items
  const itemsDiv = document.getElementById('detail-items');
  const items = selectedScale.items || [];
  if (items.length === 0) {
    itemsDiv.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">No items defined.</span>';
  } else {
    itemsDiv.innerHTML = items.map((item, i) => {
      const txt = typeof item==='string' ? item : (item.label||item.text||'');
      const rev = typeof item==='object' && item.reverse_scored;
      return `<div class="item-row">
        <span style="color:var(--text-muted);min-width:20px;">${i+1}.</span>
        <span style="flex:1;">${esc(txt)}</span>
        ${rev?'<span class="tag" style="font-size:10px;">Reverse</span>':''}
      </div>`;
    }).join('');
  }

  // Linked papers
  const papersDiv = document.getElementById('detail-papers');
  const linked = selectedScale.scale_papers || [];
  if (linked.length === 0) {
    papersDiv.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">No linked papers.</span>';
  } else {
    papersDiv.innerHTML = linked.map(lp => `
      <div class="paper-link">
        <a href="../papers-app/#${lp.paper_id}" target="_blank">${esc(lp.papers?.title||'Unknown Paper')}</a>
        <span class="usage-badge">${lp.usage_type}</span>
        <span class="btn btn-ghost btn-sm" style="padding:2px 6px;" onclick="unlinkPaper('${lp.id}')">&times;</span>
      </div>
    `).join('');
  }
}

// ═══════════════════════════════════════════
// CREATE / EDIT MODAL
// ═══════════════════════════════════════════
function openCreateModal() {
  editingScaleId = null;
  document.getElementById('modal-title').textContent = 'Create Scale';
  document.getElementById('scale-name').value = '';
  document.getElementById('scale-desc').value = '';
  document.getElementById('scale-source-type').value = 'original';
  document.getElementById('original-scale-group').style.display = 'none';
  document.getElementById('original-scale-select').innerHTML = scales
    .filter(s => s.source_type === 'original')
    .map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  document.getElementById('items-editor').innerHTML = '';
  addItemRow();
  document.getElementById('scale-modal').style.display = 'flex';
}

function openEditModal() {
  if (!selectedScale) return;
  editingScaleId = selectedScale.id;
  document.getElementById('modal-title').textContent = 'Edit Scale';
  document.getElementById('scale-name').value = selectedScale.name;
  document.getElementById('scale-desc').value = selectedScale.description || '';
  document.getElementById('scale-source-type').value = selectedScale.source_type;
  toggleOriginalGroup();
  document.getElementById('original-scale-select').innerHTML = scales
    .filter(s => s.source_type === 'original' && s.id !== selectedScale.id)
    .map(s => `<option value="${s.id}" ${s.id===selectedScale.original_scale_id?'selected':''}>${esc(s.name)}</option>`).join('');
  const editor = document.getElementById('items-editor');
  editor.innerHTML = '';
  const items = selectedScale.items || [];
  if (items.length === 0) addItemRow();
  else items.forEach(item => addItemRow(typeof item==='string' ? {label:item} : item));
  document.getElementById('scale-modal').style.display = 'flex';
}

function toggleOriginalGroup() {
  const type = document.getElementById('scale-source-type').value;
  document.getElementById('original-scale-group').style.display = type !== 'original' ? 'block' : 'none';
}

function addItemRow(item = null) {
  const editor = document.getElementById('items-editor');
  const row = document.createElement('div');
  row.className = 'item-input-row';
  row.innerHTML = `
    <input placeholder="Item label" value="${esc(item?.label||item?.text||'')}">
    <label><input type="checkbox" ${item?.reverse_scored?'checked':''}> Reverse</label>
    <span class="btn btn-ghost btn-sm" style="padding:2px 6px;color:var(--danger);" onclick="this.parentElement.remove()">&times;</span>
  `;
  editor.appendChild(row);
}

async function saveScale() {
  const name = document.getElementById('scale-name').value.trim();
  if (!name) { toast('Please enter a scale name', 'error'); return; }
  const desc = document.getElementById('scale-desc').value.trim();
  const sourceType = document.getElementById('scale-source-type').value;
  const originalId = sourceType !== 'original' ? document.getElementById('original-scale-select').value || null : null;

  const items = [];
  document.querySelectorAll('#items-editor .item-input-row').forEach(row => {
    const input = row.querySelector('input[type=text]');
    const chk = row.querySelector('input[type=checkbox]');
    if (input.value.trim()) items.push({ label: input.value.trim(), reverse_scored: chk?.checked || false });
  });

  const payload = { name, description: desc, items, source_type: sourceType, original_scale_id: originalId, created_by: 'KeyResearch User' };

  try {
    if (editingScaleId) {
      const { error } = await sb.from('scales').update(payload).eq('id', editingScaleId);
      if (error) { toast('Update failed: ' + error.message, 'error'); return; }
      toast('Scale updated!', 'success');
    } else {
      const { error } = await sb.from('scales').insert(payload);
      if (error) { toast('Create failed: ' + error.message, 'error'); return; }
      toast('Scale created!', 'success');
    }
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
    return;
  }
  closeScaleModal();
  await loadScales();
  renderScaleList();
  if (editingScaleId) selectScale(editingScaleId);
  else if (scales.length > 0) selectScale(scales[0].id);
}

function closeScaleModal() {
  document.getElementById('scale-modal').style.display = 'none';
  editingScaleId = null;
}

// ═══════════════════════════════════════════
// LINK PAPER
// ═══════════════════════════════════════════
function openLinkPaperModal() {
  if (!selectedScale) return;
  const select = document.getElementById('paper-select');
  select.innerHTML = papers.map(p => `<option value="${p.id}">${esc(p.title)}</option>`).join('');
  document.getElementById('usage-type').value = 'used';
  document.getElementById('link-notes').value = '';
  document.getElementById('link-paper-modal').style.display = 'flex';
}

async function savePaperLink() {
  const paperId = document.getElementById('paper-select').value;
  const usageType = document.getElementById('usage-type').value;
  const notes = document.getElementById('link-notes').value.trim();
  if (!paperId) return;

  try {
    const { error } = await sb.from('scale_papers').insert({
      scale_id: selectedScale.id, paper_id: paperId, usage_type: usageType, notes
    });
    if (error) { toast('Link failed: ' + error.message, 'error'); return; }
    toast('Paper linked!', 'success');
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
    return;
  }
  closeLinkPaperModal();
  await loadScales();
  selectScale(selectedScale.id);
}

async function unlinkPaper(linkId) {
  if (!confirm('Unlink this paper from the scale?')) return;
  try {
    const { error } = await sb.from('scale_papers').delete().eq('id', linkId);
    if (error) { toast('Unlink failed: ' + error.message, 'error'); return; }
    toast('Paper unlinked', 'info');
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
    return;
  }
  await loadScales();
  selectScale(selectedScale.id);
}

function closeLinkPaperModal() {
  document.getElementById('link-paper-modal').style.display = 'none';
}

// ═══════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════
async function deleteScaleConfirm() {
  if (!selectedScale) return;
  if (!confirm(`Delete scale "${selectedScale.name}"? This cannot be undone.`)) return;
  try {
    const { error } = await sb.from('scales').delete().eq('id', selectedScale.id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Scale deleted', 'success');
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
    return;
  }
  closeDetail();
  await loadScales();
  renderScaleList();
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  selectedScale = null;
  renderScaleList();
}

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
init();
</script>
</body>
</html>
